<div class="header-container">
  <h1 class="app-title">Way to Kashmir</h1>

  <nav class="nav-menu" aria-label="Main navigation">
    <a
      routerLink="/home"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{ exact: true }"
      class="nav-link"
    >
      Home
    </a>

    <a routerLink="/about" routerLinkActive="active" class="nav-link"> About </a>

    <a routerLink="/privacy-policy" routerLinkActive="active" class="nav-link"> Privacy Policy </a>

    <!-- 🔐 AUTH BUTTON -->
    @if (!isLoggedIn()) {
      <button class="login-btn" (click)="openLogin()">Login</button>
    } @else {
      <button class="login-btn logout" (click)="logout()">Logout</button>
    }
  </nav>
</div>

<!-- 🔐 LOGIN POPUP -->
@if (showLogin()) {
  <app-login (closed)="closeLogin($event)" />
}
